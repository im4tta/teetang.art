  <body>
    <div id="root"></div>

    <!-- Prevent page pinch-zoom and double-tap zoom on mobile while keeping map gestures intact -->
    <script>
      (function () {
        // Block multi-touch pinch zoom outside the map canvas.
        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches.length > 1 && !e.target.closest(".map-container")) {
              e.preventDefault();
            }
          },
          { passive: false },
        );

        // Block double-tap page zoom.
        document.addEventListener(
          "dblclick",
          function (e) {
            e.preventDefault();
          },
          { passive: false },
        );
      })();
    </script>
