# .github/workflows/claude-contributor.yml
# Place this file at: .github/workflows/claude-contributor.yml

name: Claude Contributor

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message'
        required: true
        default: 'feat: add Claude-generated code'
      branch:
        description: 'Target branch'
        required: false
        default: 'main'

jobs:
  push-as-claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.event.inputs.branch }}

      # ── Configure git to commit AS Claude ──────────────────────────────
      # Claude's public profile: github.com/claude
      # Using noreply address links the commit to the @claude account
      - name: Configure git identity
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"

      # ── Put your generated files here ──────────────────────────────────
      # Option A: copy files from a specific folder
      # - name: Copy generated files
      #   run: cp -r ./generated/* ./src/

      # Option B: write a file inline
      - name: Write generated file (example)
        run: |
          mkdir -p src
          cat <<'EOF' > src/generated-example.js
          // Generated by Claude (claude.ai)
          export function greet(name) {
            return `Hello, ${name}!`;
          }
          EOF

      # ── Stage, commit, and push ─────────────────────────────────────────
      - name: Commit and push
        run: |
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "${{ github.event.inputs.message }}"
          git push origin ${{ github.event.inputs.branch }}
